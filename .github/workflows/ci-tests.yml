name: CI - Tests and Reports

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Lint
        run: ruff check . || true

      - name: Run tests (JUnit xml)
        run: pytest -q --junitxml=tests/report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v5
        with:
          name: pytest-report
          path: tests/report.xml

      - name: Show last 100 lines of pytest output (for easier debugging)
        if: failure()
        run: tail -n 100 tests/report.xml || true
