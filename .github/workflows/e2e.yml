name: Browser E2E

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright runtime and UI smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      FIREBASE_PROJECT_ID: demo-glucoplate

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install application
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Set up Java for Firebase Emulator
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Start Firebase Auth Emulator
        run: |
          npx --yes firebase-tools@latest emulators:start --only auth --project demo-glucoplate > firebase-emulator.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:9099/ > /dev/null; then
              echo 'Firebase Auth Emulator is ready.'
              exit 0
            fi
            sleep 2
          done
          cat firebase-emulator.log
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Playwright
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run e2e

      - name: Run authenticated emulator API test
        env:
          AUTH_TEST_BASE_URL: http://127.0.0.1:8001
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 > api-emulator.log 2>&1 &
          API_PID=$!
          trap 'kill $API_PID' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8001/health > /dev/null; then break; fi
            sleep 2
          done
          pytest -q tests/test_firebase_auth_emulator.py

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
