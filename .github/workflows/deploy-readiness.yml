name: Deploy Readiness

on:
  push:
    branches:
      - main
      - deploy-readiness-check
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-python-app:
    name: Verify Python app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install app and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Import FastAPI app
        run: |
          python - <<'PY'
          from app.main import app
          print('Imported app:', app.title)
          PY

      - name: Run tests if present
        run: |
          if [ -d tests ] && find tests -type f -name 'test_*.py' | grep -q .; then
            pytest -q
          else
            echo 'No tests found yet; skipping pytest.'
          fi

      - name: Ruff check
        run: |
          ruff check app tests || true

  verify-docker-image:
    name: Build and smoke-test Docker image
    runs-on: ubuntu-latest
    needs: verify-python-app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t glucoplate-ai:ci .

      - name: Run container
        run: |
          docker run -d --name glucoplate-ai-ci -p 8000:8000 glucoplate-ai:ci
          sleep 10

      - name: Smoke test health endpoint
        run: |
          curl --fail --show-error --silent http://127.0.0.1:8000/health

      - name: Smoke test root redirect/static app
        run: |
          curl --fail --show-error --silent --location http://127.0.0.1:8000/ | head -c 300

      - name: Show container logs on failure
        if: failure()
        run: docker logs glucoplate-ai-ci || true

      - name: Stop container
        if: always()
        run: docker rm -f glucoplate-ai-ci || true
