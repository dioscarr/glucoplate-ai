name: Deploy to Render and Run Live Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-production-deploy
  cancel-in-progress: false

jobs:
  deploy-and-test:
    name: Deploy production and verify live API
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      LIVE_SITE_URL: https://glucoplate-ai.onrender.com
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$RENDER_DEPLOY_HOOK" || { echo "::error::RENDER_DEPLOY_HOOK is missing"; exit 1; }
          test -n "$RENDER_API_KEY" || { echo "::error::RENDER_API_KEY is missing"; exit 1; }

      - name: Trigger Render deploy
        id: trigger
        run: |
          SERVICE_ID=$(printf '%s' "$RENDER_DEPLOY_HOOK" | grep -oE 'srv-[A-Za-z0-9]+' | head -1)
          test -n "$SERVICE_ID" || { echo "::error::Could not extract the Render service ID from the deploy hook"; exit 1; }

          HTTP_CODE=$(curl --fail-with-body --silent --show-error             --request POST             --output render-deploy.json             --write-out '%{http_code}'             "$RENDER_DEPLOY_HOOK")

          echo "Render deploy hook returned HTTP $HTTP_CODE"
          cat render-deploy.json
          DEPLOY_ID=$(jq -r '.deploy.id // .id // empty' render-deploy.json)

          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "hook_status=$HTTP_CODE" >> "$GITHUB_OUTPUT"

      - name: Resolve queued Render deploy
        id: resolve
        env:
          SERVICE_ID: ${{ steps.trigger.outputs.service_id }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          if [ -n "$DEPLOY_ID" ]; then
            echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "The hook queued behind another deploy; waiting for the deploy for commit $GITHUB_SHA."
          for attempt in $(seq 1 40); do
            RESPONSE=$(curl --fail-with-body --silent --show-error               --header "Authorization: Bearer $RENDER_API_KEY"               --header "Accept: application/json"               "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=20")
            DEPLOY_ID=$(printf '%s' "$RESPONSE" | jq -r --arg sha "$GITHUB_SHA" '
              [.[] | (.deploy // .) | select((.commit.id // "") == $sha)]
              | sort_by(.createdAt // "")
              | last
              | .id // empty
            ')
            if [ -n "$DEPLOY_ID" ]; then
              echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt: queued deploy is not visible yet."
            sleep 15
          done

          echo "::error::Timed out resolving the queued Render deployment ID"
          exit 1

      - name: Wait for this Render deploy to become live
        env:
          SERVICE_ID: ${{ steps.trigger.outputs.service_id }}
          DEPLOY_ID: ${{ steps.resolve.outputs.deploy_id }}
        run: |
          echo "Monitoring Render deploy $DEPLOY_ID for service $SERVICE_ID"
          for attempt in $(seq 1 120); do
            RESPONSE=$(curl --fail-with-body --silent --show-error               --header "Authorization: Bearer $RENDER_API_KEY"               --header "Accept: application/json"               "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID")
            STATUS=$(printf '%s' "$RESPONSE" | jq -r '.status // .deploy.status // "unknown"')
            echo "Attempt $attempt: Render status is $STATUS"

            case "$STATUS" in
              live)
                echo "Render deployment is live."
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "::error::Render deployment ended with status: $STATUS"
                printf '%s\n' "$RESPONSE"
                exit 1
                ;;
            esac
            sleep 15
          done

          echo "::error::Timed out waiting for Render deployment $DEPLOY_ID"
          exit 1

      - name: Wait for production health endpoint
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error --max-time 30 "$LIVE_SITE_URL/health" > health.json; then
              cat health.json
              exit 0
            fi
            echo "Health attempt $attempt failed; retrying."
            sleep 10
          done
          echo "::error::Production health endpoint never became ready"
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install live-test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx

      - name: Run post-deployment live tests
        run: pytest -q -m live tests/test_live.py
