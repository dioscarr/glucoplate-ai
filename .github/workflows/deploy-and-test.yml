name: Verify Render Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-production-verification
  cancel-in-progress: false

jobs:
  verify-production:
    name: Verify production after Render Auto-Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LIVE_SITE_URL: https://glucoplate-ai.onrender.com

    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v5

      - name: Wait for Render Auto-Deploy health
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error --max-time 30 "$LIVE_SITE_URL/health" > health.json; then
              cat health.json
              exit 0
            fi
            echo "Health attempt $attempt failed; Render Auto-Deploy may still be building."
            sleep 10
          done
          echo "::error::Render Auto-Deploy did not expose a healthy application within 10 minutes."
          exit 1

      - name: Verify production app shell
        run: |
          curl --fail --silent --show-error --location "$LIVE_SITE_URL/" > index.html
          grep -F "GlucoPlate AI" index.html
          grep -F "/static/live-cook-rooms.js" index.html

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install live-test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx

      - name: Run post-deployment live tests
        run: pytest -q -m live tests/test_live.py
