name: Python CI

on:
  push:
    branches: [ main, feature/deployment-render ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
