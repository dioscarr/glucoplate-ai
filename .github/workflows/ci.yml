name: CI Integrity Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  integrity:
    name: Lint, import, and integrity contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Import check
        run: python -m compileall app tests

      - name: Integrity contract tests
        run: pytest -q tests/test_integrity_contracts.py

  integration:
    name: FastAPI integration tests
    runs-on: ubuntu-latest
    needs: integrity

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: API integration tests
        run: pytest -q tests/test_integration_api.py

  notify:
    name: Optional webhook notification
    runs-on: ubuntu-latest
    needs: [ integrity, integration ]
    if: always()
    env:
      CI_NOTIFICATION_WEBHOOK_URL: ${{ secrets.CI_NOTIFICATION_WEBHOOK_URL }}
      INTEGRITY_RESULT: ${{ needs.integrity.result }}
      INTEGRATION_RESULT: ${{ needs.integration.result }}

    steps:
      - name: Send CI notification
        if: env.CI_NOTIFICATION_WEBHOOK_URL != ''
        run: |
          STATUS="success"
          if [ "$INTEGRITY_RESULT" != "success" ] || [ "$INTEGRATION_RESULT" != "success" ]; then
            STATUS="failure"
          fi

          MESSAGE="GlucoPlate AI CI ${STATUS}: integrity=${INTEGRITY_RESULT}, integration=${INTEGRATION_RESULT}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          python - <<'PY' > payload.json
          import json
          import os

          message = os.environ["MESSAGE"]
          payload = {
              "project": "GlucoPlate AI",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "workflow": os.environ["GITHUB_WORKFLOW"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "ref": os.environ["GITHUB_REF"],
              "sha": os.environ["GITHUB_SHA"],
              "status": os.environ["STATUS"],
              "integrity_result": os.environ["INTEGRITY_RESULT"],
              "integration_result": os.environ["INTEGRATION_RESULT"],
              "content": message,
              "text": message,
          }
          print(json.dumps(payload))
          PY

          curl --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --data @payload.json \
            "$CI_NOTIFICATION_WEBHOOK_URL"
        env:
          STATUS: ${{ (needs.integrity.result == 'success' && needs.integration.result == 'success') && 'success' || 'failure' }}
          MESSAGE: GlucoPlate AI CI notification
