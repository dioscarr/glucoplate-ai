<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Login | GlucoPlate AI</title>
  <style>
    *{box-sizing:border-box}:root{--bg:#f7f4ef;--surface:#fff;--text:#211f1d;--muted:#756f69;--line:#e7ded4;--brand:#f26a2e;--brand2:#ff9e3d;--green:#257453;--shadow:0 18px 50px rgba(59,43,30,.12);--radius:26px}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 20% 0%,#fff2e6,transparent 32%),var(--bg);color:var(--text);display:grid;place-items:center;padding:18px}a{color:#a54520;font-weight:850}.card{width:min(520px,100%);background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),var(--brand2));font-size:1.35rem;box-shadow:0 8px 20px rgba(242,106,46,.24)}.eyebrow{font-size:.75rem;font-weight:900;color:#a54520;text-transform:uppercase;letter-spacing:.07em;margin-top:18px}h1{font-size:clamp(2.1rem,9vw,3.4rem);letter-spacing:-.06em;line-height:.95;margin:8px 0 10px}p{color:var(--muted);line-height:1.45}.field{display:grid;gap:7px;margin:14px 0}label{font-weight:850}input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px 15px;font:inherit;outline:none}input:focus{border-color:#efa076;box-shadow:0 0 0 4px rgba(242,106,46,.10)}button{width:100%;border:0;border-radius:17px;padding:14px 18px;font:inherit;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 10px 24px rgba(242,106,46,.24)}button:disabled{opacity:.55;cursor:not-allowed}.status{margin-top:14px;border-radius:16px;padding:12px;background:#fff7ef;color:#7c462f}.success{background:#e8f4ee;color:#245d46}.footer{margin-top:18px;text-align:center;font-size:.9rem}.profile{margin-top:14px;border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.profile strong{display:block}.profile span{display:block;color:var(--muted);font-size:.86rem;margin-top:4px}.actions{display:grid;gap:10px;margin-top:14px}.ghost{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🍽️</div>
    <div class="eyebrow">Secure Google sign-in</div>
    <h1>Welcome back.</h1>
    <p>Returning members sign in with the Google account already connected to GlucoPlate. No username, password, or access code is needed.</p>
    <div class="status success">The secure Google sign-in panel opens automatically.</div>
    <div class="actions"><button onclick="location.href='/static/index.html'">Continue to GlucoPlate</button><button class="ghost" onclick="location.href='/static/register.html'">Register a new organization account</button></div>
  </main>
</body>
</html>
