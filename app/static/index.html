<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlucoPlate AI — Diabetes-Friendly Recipes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d7a4f;
      --green-light: #e8f5ee;
      --green-mid: #4caf80;
      --orange: #e07b3a;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --red-light: #fef2f2;
      --red: #dc2626;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--green);
      color: white;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header .logo { font-size: 1.75rem; }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.3px; }
    header p  { font-size: .8rem; opacity: .8; margin-top: 2px; }

    /* ── Layout ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 700px) {
      .container { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .card h2 { font-size: 1rem; font-weight: 700; color: var(--green); margin-bottom: 1rem; }

    /* ── Form ── */
    .field { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: .35rem;
    }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: .9rem;
      color: var(--gray-800);
      background: var(--gray-50);
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--green-mid);
      background: white;
    }
    textarea { resize: vertical; min-height: 64px; }

    .row { display: flex; gap: .75rem; }
    .row .field { flex: 1; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem .75rem;
      background: var(--green-light);
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: .85rem;
      font-weight: 600;
      color: var(--green);
    }
    .toggle {
      position: relative; width: 44px; height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      inset: 0; background: var(--gray-200);
      border-radius: 24px; transition: .2s;
    }
    .slider::before {
      content: ""; position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: .2s;
    }
    .toggle input:checked + .slider { background: var(--green); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    .btn {
      width: 100%;
      padding: .75rem;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn:hover  { background: #245f3d; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }

    /* ── Result panel ── */
    #result { display: none; }

    .recipe-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .recipe-header h2 { font-size: 1.3rem; font-weight: 800; color: var(--gray-800); }
    .badge {
      font-size: .7rem; font-weight: 700; padding: .25rem .6rem;
      border-radius: 99px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-ai { background: var(--green-light); color: var(--green); }
    .badge-fallback { background: #fff7ed; color: var(--orange); }

    .summary {
      font-size: .9rem; color: var(--gray-600);
      line-height: 1.6; margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--gray-200);
    }

    /* Nutrition grid */
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .5rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 500px) { .nutrition-grid { grid-template-columns: repeat(2, 1fr); } }
    .nut-card {
      background: var(--gray-100);
      border-radius: 8px;
      padding: .6rem .5rem;
      text-align: center;
    }
    .nut-card .value { font-size: 1.1rem; font-weight: 800; color: var(--green); }
    .nut-card .label { font-size: .65rem; color: var(--gray-600); margin-top: 2px; }

    /* Sections */
    .section { margin-bottom: 1.25rem; }
    .section h3 {
      font-size: .8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--gray-400);
      margin-bottom: .5rem;
    }
    .section ul, .section ol { padding-left: 1.25rem; }
    .section li { font-size: .9rem; line-height: 1.7; color: var(--gray-800); }
    .section ol li { margin-bottom: .25rem; }

    .sub-chip {
      display: inline-block;
      background: var(--gray-100);
      border-radius: 99px;
      padding: .3rem .75rem;
      font-size: .8rem;
      color: var(--gray-600);
      margin: .2rem .2rem 0 0;
    }

    /* Safety */
    .safety-box {
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .82rem;
      line-height: 1.5;
    }
    .safety-ok   { background: var(--green-light); color: #1a5c35; border: 1px solid #b6dfc9; }
    .safety-warn { background: var(--red-light);   color: var(--red);   border: 1px solid #fca5a5; }

    /* Spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      text-align: center; color: var(--gray-400);
      font-size: .9rem; margin-top: .5rem;
    }

    /* Error */
    .error-box {
      background: var(--red-light); border: 1px solid #fca5a5;
      border-radius: 8px; padding: 1rem;
      color: var(--red); font-size: .9rem;
    }

    footer {
      text-align: center;
      font-size: .75rem;
      color: var(--gray-400);
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🥗</span>
  <div>
    <h1>GlucoPlate AI</h1>
    <p>Diabetes-friendly recipe generation powered by GitHub Copilot</p>
  </div>
</header>

<div class="container">

  <!-- ── Form panel ── -->
  <div class="card">
    <h2>Generate a Recipe</h2>

    <div class="toggle-row">
      <span>🤖 Use AI (Copilot SDK)</span>
      <label class="toggle">
        <input type="checkbox" id="use_ai" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="field">
      <label for="goal">What do you want to eat?</label>
      <input type="text" id="goal" placeholder="e.g. quick Dominican-style dinner" value="quick Dominican-style dinner" />
    </div>

    <div class="row">
      <div class="field">
        <label for="servings">Servings</label>
        <input type="number" id="servings" value="2" min="1" max="12" />
      </div>
      <div class="field">
        <label for="max_carbs">Max carbs / serving (g)</label>
        <input type="number" id="max_carbs" value="45" min="0" max="150" />
      </div>
    </div>

    <div class="field">
      <label for="culture">Cultural style (optional)</label>
      <input type="text" id="culture" placeholder="e.g. Dominican, Mediterranean" value="Dominican" />
    </div>

    <div class="field">
      <label for="preferences">Preferences (comma-separated)</label>
      <input type="text" id="preferences" placeholder="e.g. low sodium, high protein" value="low sodium" />
    </div>

    <div class="field">
      <label for="avoid">Avoid ingredients (comma-separated)</label>
      <input type="text" id="avoid" placeholder="e.g. peanuts, shellfish" />
    </div>

    <button class="btn" id="submit-btn" onclick="generateRecipe()">Generate Recipe</button>
  </div>

  <!-- ── Result panel ── -->
  <div id="result">
    <div id="loading" class="card" style="display:none">
      <div class="spinner"></div>
      <p class="loading-text" id="loading-text">Generating your recipe with AI…</p>
    </div>
    <div id="error-panel" class="error-box" style="display:none"></div>
    <div id="recipe-card" class="card" style="display:none"></div>
  </div>

</div>

<footer>
  GlucoPlate AI · For general wellness support only · Not medical advice
</footer>

<script>
async function generateRecipe() {
  const goal = document.getElementById('goal').value.trim();
  if (!goal) { alert('Please describe what you want to eat.'); return; }

  const useAi = document.getElementById('use_ai').checked;
  const servings = parseInt(document.getElementById('servings').value) || 2;
  const maxCarbs = parseInt(document.getElementById('max_carbs').value) || 45;
  const culture = document.getElementById('culture').value.trim() || null;
  const prefs = document.getElementById('preferences').value
    .split(',').map(s => s.trim()).filter(Boolean);
  const avoid = document.getElementById('avoid').value
    .split(',').map(s => s.trim()).filter(Boolean);

  const body = { goal, servings, max_carbs_per_serving: maxCarbs, preferences: prefs, avoid_ingredients: avoid };
  if (culture) body.culture = culture;

  // Show loading
  const result = document.getElementById('result');
  result.style.display = 'block';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error-panel').style.display = 'none';
  document.getElementById('recipe-card').style.display = 'none';
  document.getElementById('loading-text').textContent = useAi
    ? 'Generating with GitHub Copilot AI… (may take 20–40 s)'
    : 'Generating local recipe…';

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  try {
    const res = await fetch(`/api/recipes/generate?use_ai=${useAi}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err}`);
    }
    const data = await res.json();
    renderRecipe(data);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const ep = document.getElementById('error-panel');
    ep.style.display = 'block';
    ep.textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate Recipe';
  }
}

function renderRecipe(d) {
  document.getElementById('loading').style.display = 'none';

  const isAI = d.ai_provider && d.ai_provider !== 'local-fallback';
  const badgeClass = isAI ? 'badge-ai' : 'badge-fallback';
  const badgeLabel = isAI ? '🤖 AI-generated' : '📋 Local fallback';

  const nut = d.nutrition_estimate || {};
  const nutItems = [
    { value: nut.calories ?? '—',    label: 'Calories' },
    { value: (nut.carbs_g ?? '—') + 'g',   label: 'Carbs' },
    { value: (nut.protein_g ?? '—') + 'g', label: 'Protein' },
    { value: (nut.fiber_g ?? '—') + 'g',   label: 'Fiber' },
    { value: (nut.fat_g ?? '—') + 'g',     label: 'Fat' },
    { value: (nut.sugar_g ?? '—') + 'g',   label: 'Sugar' },
    { value: (nut.sodium_mg ?? '—') + 'mg',label: 'Sodium' },
  ];

  const safety = d.safety_review || {};
  const safetyClass = safety.approved ? 'safety-ok' : 'safety-warn';
  const safetyIcon = safety.approved ? '✅' : '⚠️';
  const warningsHtml = (safety.warnings || []).length
    ? `<ul style="margin-top:.4rem;padding-left:1.2rem">${safety.warnings.map(w => `<li>${w}</li>`).join('')}</ul>`
    : '';

  const card = document.getElementById('recipe-card');
  card.innerHTML = `
    <div class="recipe-header">
      <h2>${esc(d.title)}</h2>
      <span class="badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <p class="summary">${esc(d.summary)}</p>

    <div class="nutrition-grid">
      ${nutItems.map(n => `
        <div class="nut-card">
          <div class="value">${n.value}</div>
          <div class="label">${n.label}</div>
        </div>`).join('')}
    </div>

    <div class="section">
      <h3>Ingredients</h3>
      <ul>${(d.ingredients || []).map(i => `<li>${esc(i)}</li>`).join('')}</ul>
    </div>

    <div class="section">
      <h3>Steps</h3>
      <ol>${(d.steps || []).map(s => `<li>${esc(s)}</li>`).join('')}</ol>
    </div>

    <div class="section">
      <h3>Substitutions</h3>
      <div>${(d.substitutions || []).map(s => `<span class="sub-chip">${esc(s)}</span>`).join('')}</div>
    </div>

    <div class="section">
      <h3>Safety Review</h3>
      <div class="safety-box ${safetyClass}">
        ${safetyIcon} ${esc(safety.disclaimer || '')}
        ${warningsHtml}
      </div>
    </div>

    <p style="font-size:.7rem;color:var(--gray-400);margin-top:1rem">
      Provider: <code>${esc(d.ai_provider)}</code>
    </p>
  `;
  card.style.display = 'block';
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Allow Enter key on goal input
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('goal').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateRecipe();
  });
});
</script>

</body>
</html>
